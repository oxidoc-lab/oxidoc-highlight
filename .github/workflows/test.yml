# Reusable test workflow: lint, format, docs, cross-platform tests, wasm build.
#
# Called by:
#   - ci.yml      (PR checks)
#   - release.yml (pre-publish gate)
#
# Not triggered directly — use workflow_call only.

name: Test

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint, Format & Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: lint

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build docs
        run: cargo doc --no-deps

      - name: Run doctests
        run: cargo test --doc

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: test

      - name: Run tests
        run: cargo test

  wasm:
    name: Wasm Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wasm
        run: wasm-pack build --release --target web -- --features wasm

      - name: Check wasm size
        run: |
          RAW=$(stat --printf="%s" pkg/oxidoc_highlight_bg.wasm)
          GZIP=$(gzip -c pkg/oxidoc_highlight_bg.wasm | wc -c)
          echo "Wasm size: $(( RAW / 1024 ))KB raw, $(( GZIP / 1024 ))KB gzipped"
          if [ "$GZIP" -gt 51200 ]; then
            echo "::error::Wasm gzipped size exceeds 50KB limit (${GZIP} bytes)"
            exit 1
          fi
